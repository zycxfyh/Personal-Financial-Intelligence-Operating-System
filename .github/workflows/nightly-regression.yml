name: Nightly Regression

on:
  schedule:
    - cron: "0 18 * * *"
  workflow_dispatch:

permissions:
  contents: read

env:
  PFIOS_ENV: test
  PFIOS_DEBUG: "false"
  PFIOS_AUDIT_LOG_DIR: ./data/logs/audit
  PFIOS_REASONING_PROVIDER: mock
  PFIOS_TIMEZONE: Asia/Shanghai
  NEXT_PUBLIC_API_BASE_URL: http://127.0.0.1:8000
  PFIOS_E2E_BASE_URL: http://127.0.0.1:3000

jobs:
  full-backend-regression:
    runs-on: ubuntu-latest
    env:
      PFIOS_DB_URL: duckdb:///./data/nightly-backend.duckdb

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0

      - name: Install Python dev dependencies
        run: uv sync --extra dev

      - name: Run full integration regression
        run: uv run pytest -q tests/integration

      - name: Run contract regression
        run: uv run pytest -q tests/contracts

      - name: Run API performance baselines
        run: uv run pytest -q tests/integration/test_performance_baselines.py

  frontend-quality-regression:
    runs-on: ubuntu-latest
    env:
      PFIOS_DB_URL: duckdb:///./data/nightly-frontend.duckdb

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0

      - name: Install Python dev dependencies
        run: uv sync --extra dev

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.33.0

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium

      - name: Seed E2E database
        run: uv run python scripts/seed_mvp_e2e.py

      - name: Run visual regression
        run: pnpm test:e2e:visual

      - name: Run accessibility smoke
        run: pnpm test:e2e:a11y

      - name: Run web performance baselines
        run: pnpm test:perf:web

      - name: Run Lighthouse CI
        run: pnpm lighthouse
