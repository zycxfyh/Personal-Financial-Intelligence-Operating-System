name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

env:
  PFIOS_ENV: test
  PFIOS_DEBUG: "false"
  PFIOS_AUDIT_LOG_DIR: ./data/logs/audit
  PFIOS_REASONING_PROVIDER: mock
  PFIOS_TIMEZONE: Asia/Shanghai
  NEXT_PUBLIC_API_BASE_URL: http://127.0.0.1:8000
  PFIOS_E2E_BASE_URL: http://127.0.0.1:3000

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  backend-static:
    runs-on: ubuntu-latest
    env:
      PFIOS_DB_URL: duckdb:///./data/github-ci-static.duckdb

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Install Python dev dependencies
        run: uv sync --extra dev

      - name: Compile backend modules
        run: uv run python -m compileall apps/api/app domains orchestrator governance execution state infra intelligence capabilities packs scripts shared

      - name: Lint backend
        run: uv run ruff check apps/api/app capabilities domains execution governance infra intelligence orchestrator packs shared state

      - name: Format check backend
        run: uv run ruff format --check apps/api/app capabilities domains execution governance infra intelligence orchestrator packs shared state

      - name: Type check backend (governance)
        continue-on-error: true
        run: uv run mypy governance/

  backend-unit:
    runs-on: ubuntu-latest
    env:
      PFIOS_DB_URL: duckdb:///./data/github-ci-unit.duckdb

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Install Python dev dependencies
        run: uv sync --extra dev

      - name: Run backend unit tests
        run: uv run pytest -q tests/unit

  backend-integration:
    runs-on: ubuntu-latest
    env:
      PFIOS_DB_URL: duckdb:///./data/github-ci-integration.duckdb

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Install Python dev dependencies
        run: uv sync --extra dev

      - name: Run backend integration tests
        run: |
          uv run pytest -q \
            tests/integration/test_hermes_analyze_api.py \
            tests/integration/test_health_monitoring_api.py \
            tests/integration/test_scheduler_persistence.py \
            tests/integration/test_api_product_surfaces.py \
            tests/integration/test_api_semantic_outputs.py \
            tests/integration/test_workflow_run_lineage_api.py

  frontend-static:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.33.0

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: pnpm

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint frontend
        run: pnpm lint:web

      - name: Type check frontend
        run: pnpm typecheck:web

  frontend-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.33.0

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: pnpm

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        run: pnpm build:web

  frontend-components:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.33.0

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: pnpm

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Run frontend component tests
        run: pnpm --dir apps/web test

  api-contract:
    runs-on: ubuntu-latest
    env:
      PFIOS_DB_URL: duckdb:///./data/github-ci-contract.duckdb

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Install Python dev dependencies
        run: uv sync --extra dev

      - name: Regenerate OpenAPI snapshot
        run: uv run python scripts/export_openapi.py

      - name: Assert OpenAPI snapshot is committed
        run: git diff --exit-code -- tests/contracts/openapi.snapshot.json

      - name: Run contract tests
        run: uv run pytest -q tests/contracts

  a11y-smoke:
    runs-on: ubuntu-latest
    needs:
      - frontend-static
      - backend-integration
    env:
      PFIOS_DB_URL: duckdb:///./data/github-ci-a11y.duckdb

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Install Python dev dependencies
        run: uv sync --extra dev

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.33.0

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: pnpm

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium

      - name: Seed database
        run: uv run python scripts/seed_mvp_e2e.py

      - name: Run accessibility smoke
        run: pnpm test:e2e:a11y

  mvp-e2e:
    runs-on: ubuntu-latest
    needs:
      - backend-integration
      - frontend-build
      - frontend-components
      - api-contract
      - a11y-smoke
    env:
      PFIOS_DB_URL: duckdb:///./data/github-ci-e2e.duckdb

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Install Python dev dependencies
        run: uv sync --extra dev

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.33.0

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: pnpm

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium

      - name: Seed MVP E2E database
        run: uv run python scripts/seed_mvp_e2e.py

      - name: Run MVP E2E smoke
        run: pnpm test:e2e:mvp
