# PFIOS Trading Limits (机器可执行规则)
# version: 1.0

risk_limits:
  max_leverage: 10
  max_position_size_pct: 20.0
  max_drawdown_daily_pct: 3.0
  mandatory_sl_required: true

compliance:
  forbidden_symbols: []
  allowed_exchanges: ["binance", "okx"]

operational:
  require_human_confirmation: true
  min_confidence_score: 0.5
  mandatory_cooling_period_hours: 4
